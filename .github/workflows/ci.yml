name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the smoke job only reads the repo (2026-07-02 council).
permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      # Actions SHA-pinned (tags are mutable); the comment keeps the human-readable version.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Pin Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Pin Node (for the JS syntax check below)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Smoke tests (server + reader security, perms, dashboards, gitignore, cross-refs, phase-order, scripts)
        run: python3 tests/smoke.py

      - name: Validate dashboard render scripts (JS syntax)
        run: |
          set -e
          for f in templates/linkedin-analysis.template.html templates/start-here.template.html; do
            awk 'BEGIN{n=0}/<script>/{n++;if(n>=1){g=1;next}}/<\/script>/{g=0}g' "$f" > /tmp/render.js
            node --check /tmp/render.js && echo "JS ok: $f"
          done
