<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Ascend — evidence-grounded job search and career advancement. Runs inside Claude Code.">
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe2b0"/>
      <stop offset="38%" stop-color="#ffb86b" stop-opacity="0.9"/>
      <stop offset="72%" stop-color="#5b9dff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#5b9dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hz" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2937" stop-opacity="0"/>
      <stop offset="32%" stop-color="#5b9dff"/>
      <stop offset="60%" stop-color="#ffb86b"/>
      <stop offset="100%" stop-color="#1f2937" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="above"><rect x="0" y="0" width="1280" height="214"/></clipPath>
  </defs>

  <!-- backdrop (matches the dashboard tokens) -->
  <rect width="1280" height="320" fill="#0b0f14"/>
  <rect x="0.5" y="0.5" width="1279" height="319" fill="none" stroke="#1f2937" stroke-width="1"/>

  <!-- ───────────── left: a sun rising over the horizon ───────────── -->
  <!-- glow halo -->
  <circle cx="234" cy="214" r="150" fill="url(#sun)" opacity="0.85"/>
  <g clip-path="url(#above)">
    <!-- the rising sun disc -->
    <circle cx="234" cy="214" r="50" fill="#ffd9a8"/>
    <circle cx="234" cy="214" r="50" fill="url(#sun)"/>
    <!-- rays climbing upward -->
    <g stroke="#5b9dff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7">
      <line x1="234" y1="120" x2="234" y2="92"/>
      <line x1="170" y1="138" x2="156" y2="116"/>
      <line x1="298" y1="138" x2="312" y2="116"/>
      <line x1="120" y1="176" x2="100" y2="162"/>
      <line x1="348" y1="176" x2="368" y2="162"/>
    </g>
  </g>
  <!-- the horizon -->
  <line x1="36" y1="214" x2="440" y2="214" stroke="url(#hz)" stroke-width="2"/>

  <!-- ───────────── wordmark ───────────── -->
  <text x="486" y="190" font-weight="800" font-size="104" letter-spacing="1" fill="#e6edf3">Ascend<tspan fill="#5b9dff">.</tspan></text>

  <!-- subtitle -->
  <text x="492" y="232" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" letter-spacing="4" fill="#8b97a7">EVIDENCE-GROUNDED<tspan fill="#5b9dff">&#160;·&#160;</tspan>JOB SEARCH<tspan fill="#5b9dff">&#160;·&#160;</tspan>CAREER ASCENT</text>

  <!-- tagline -->
  <text x="490" y="274" font-size="22" font-weight="600" fill="#e6edf3">Rise on what's real.</text>

  <!-- platform pill, bottom-right -->
  <g>
    <rect x="1040" y="266" width="196" height="28" rx="14" fill="none" stroke="#1f2937" stroke-width="1"/>
    <circle cx="1062" cy="280" r="3" fill="#5b9dff"/>
    <text x="1074" y="284" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="2" fill="#5b9dff">RUNS INSIDE CLAUDE CODE</text>
  </g>
</svg>
