<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="S.P.I.D.E.R. — Strategic Profile Intelligence and Direct Employment Routing. Runs inside Claude Code.">
  <defs>
    <radialGradient id="glow" cx="28%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#5b9dff" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#5b9dff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#5b9dff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop (matches the dashboard tokens) -->
  <rect width="1280" height="320" fill="#0b0f14"/>
  <rect width="1280" height="320" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1279" height="319" fill="none" stroke="#1f2937" stroke-width="1" rx="0"/>

  <!-- ───────────── left: spider web anchored to the top-left corner ───────────── -->
  <g stroke="#1f2937" stroke-width="1" fill="none" stroke-linecap="round">
    <!-- radial spokes from the corner -->
    <line x1="0" y1="0" x2="430" y2="40"/>
    <line x1="0" y1="0" x2="410" y2="150"/>
    <line x1="0" y1="0" x2="360" y2="250"/>
    <line x1="0" y1="0" x2="250" y2="320"/>
    <line x1="0" y1="0" x2="120" y2="320"/>
    <line x1="0" y1="0" x2="460" y2="95"/>
    <!-- concentric web threads (catenary-ish arcs across the spokes) -->
    <path d="M120,11 Q95,90 70,175 Q60,250 47,320" />
    <path d="M235,22 Q190,120 150,215 Q128,270 105,320"/>
    <path d="M345,33 Q285,140 232,238"/>
  </g>
  <!-- a couple of accent threads that subtly glow -->
  <g stroke="#5b9dff" stroke-width="0.75" fill="none" stroke-opacity="0.45" stroke-linecap="round">
    <path d="M120,11 Q95,90 70,175 Q60,250 47,320"/>
    <line x1="0" y1="0" x2="410" y2="150"/>
  </g>

  <!-- ───────────── the minimal geometric spider (abstract, engineered) ───────────── -->
  <!-- dangling thread -->
  <line x1="258" y1="0" x2="258" y2="120" stroke="#5b9dff" stroke-width="0.75" stroke-opacity="0.7"/>
  <g stroke-linecap="round">
    <!-- legs: 2-segment polylines, 4 per side -->
    <g stroke="#8b97a7" stroke-width="1.6" fill="none">
      <polyline points="244,150 214,132 196,142"/>
      <polyline points="244,156 210,156 190,166"/>
      <polyline points="246,162 214,178 198,194"/>
      <polyline points="248,168 222,196 210,214"/>
      <polyline points="272,150 302,132 320,142"/>
      <polyline points="272,156 306,156 326,166"/>
      <polyline points="270,162 302,178 318,194"/>
      <polyline points="268,168 294,196 306,214"/>
    </g>
    <!-- the two front legs accented -->
    <g stroke="#5b9dff" stroke-width="1.8" fill="none">
      <polyline points="246,146 220,120 206,104"/>
      <polyline points="270,146 296,120 310,104"/>
    </g>
  </g>
  <!-- body: two stacked ellipses -->
  <ellipse cx="258" cy="148" rx="11" ry="9" fill="#e6edf3"/>
  <ellipse cx="258" cy="166" rx="15" ry="17" fill="#e6edf3"/>
  <circle cx="258" cy="166" r="6" fill="#5b9dff" fill-opacity="0.55"/>

  <!-- ───────────── wordmark: S·P·I·D·E·R with accent-square separators ───────────── -->
  <g fill="#e6edf3" font-weight="800" font-size="78" letter-spacing="2">
    <text x="486" y="170">S</text>
    <text x="566" y="170">P</text>
    <text x="640" y="170">I</text>
    <text x="690" y="170">D</text>
    <text x="772" y="170">E</text>
    <text x="846" y="170">R</text>
  </g>
  <g fill="#5b9dff">
    <rect x="548" y="156" width="8" height="8"/>
    <rect x="624" y="156" width="8" height="8"/>
    <rect x="676" y="156" width="8" height="8"/>
    <rect x="754" y="156" width="8" height="8"/>
    <rect x="828" y="156" width="8" height="8"/>
    <rect x="892" y="156" width="8" height="8"/>
  </g>

  <!-- expansion line -->
  <text x="488" y="212" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" letter-spacing="4.5" fill="#8b97a7">STRATEGIC<tspan fill="#5b9dff">&#160;·&#160;</tspan>PROFILE<tspan fill="#5b9dff">&#160;·&#160;</tspan>INTELLIGENCE<tspan fill="#5b9dff">&#160;·&#160;</tspan>DIRECT<tspan fill="#5b9dff">&#160;·&#160;</tspan>EMPLOYMENT<tspan fill="#5b9dff">&#160;·&#160;</tspan>ROUTING</text>

  <!-- tagline -->
  <text x="488" y="258" font-size="22" font-weight="600" fill="#e6edf3">Spin the web.<tspan fill="#5b9dff">&#160;Catch the job.</tspan></text>

  <!-- platform pill, bottom-right -->
  <g>
    <rect x="1040" y="266" width="196" height="28" rx="14" fill="none" stroke="#1f2937" stroke-width="1"/>
    <circle cx="1062" cy="280" r="3" fill="#5b9dff"/>
    <text x="1074" y="284" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="2" fill="#5b9dff">RUNS INSIDE CLAUDE CODE</text>
  </g>
</svg>
